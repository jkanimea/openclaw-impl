services:
  ubuntu-gui:
    image: lscr.io/linuxserver/webtop:ubuntu-kde
    container_name: openclaw_gui_v2
    privileged: true
    container_name: openclaw_gui_v2
    networks:
      openclaw_network:
        ipv4_address: 10.89.0.10
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - TITLE=OpenClaw Desktop
      - START_DOCKER=true
      - OLLAMA_HOST=ollama:11434
    volumes:
      - ./openclaw_config:/config/.openclaw
      - config_vol:/config
    ports:
      - 3002:3000
      - 18789:18789
    shm_size: "2gb"
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy_openclaw_proxy
    restart: on-failure:10
    ports:
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./localhost+3.pem:/etc/caddy/cert.pem:ro
      - ./localhost+3-key.pem:/etc/caddy/key.pem:ro
    depends_on:
      ubuntu-gui:
        condition: service_started
    networks:
      - openclaw_network

  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: openclaw_ollama
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    devices:
      - nvidia.com/gpu=all
    volumes:
      - ollama_vol:/root/.ollama

networks:
  openclaw_network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.0.0/24

volumes:
  config_vol:
  ollama_vol:
